<!-- DOCTYPE :告诉浏览器,我们使用什么规范 -->
<!DOCTYPE html>
<!-- html标签外的东西不会显示 -->
<html lang="en">
<!-- head网页头部 -->
<head>
    <!-- meta描述性标签，它用来描述我们的网站的一些信息 -->
    <!-- meta一般用来做SEO  -->
    <meta charset="UTF-8">
    <meta name="keywords" content="Monarch,白鲸">
    <meta name="description" content="个人的学习笔记">
    <!-- title网页标题 -->
    <title>第一个网页</title>
</head>
<!-- body网页主体 -->
<body>
<!-- h1表示文字字体级别 -->
    <h1>
        Hello World！
    </h1>
</body>
</html>
